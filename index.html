<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LG Sales Pro | Multi-Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --lg-red: #a50034; 
            --lg-dark-red: #820029;
            --dark-bg: #1a1a1a; 
            --premium-gray: #f8f9fa;
            --text-main: #333;
            --text-sub: #6c757d;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.08);
            --shadow-lg: 0 15px 40px rgba(165,0,52,0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --accent: #27ae60;
            --blue: #2980b9;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--premium-gray); color: var(--text-main); padding-bottom: 80px; overflow-x: hidden; letter-spacing: -0.01em; }
        
        /* Ana Sistem Seçici */
        .system-selector {
            display: flex;
            background: #222;
            padding: 5px;
            gap: 5px;
            position: sticky;
            top: 0;
            z-index: 1100;
        }
        .sys-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: #888;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sys-btn.active { background: var(--lg-red); color: white; }

        header { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px; 
            position: sticky; 
            top: 50px; /* System selector altı */
            z-index: 1000; 
            box-shadow: var(--shadow-sm); 
            border-bottom: 1px solid #eee;
            display: flex; align-items: center; justify-content: center;
        }

        header img { width: 40px; height: auto; } 
        header .divider { height: 20px; width: 1px; background-color: #ddd; margin: 0 12px; }
        header .app-title { font-size: 1rem; font-weight: 700; color: #222; }
        header .app-title span { color: var(--lg-red); }

        .container { padding: 20px; max-width: 650px; margin: auto; }

        .main-ciro-card {
            background: linear-gradient(135deg, var(--lg-red) 0%, var(--lg-dark-red) 100%);
            color: white; border-radius: 20px; padding: 30px;
            box-shadow: var(--shadow-lg); text-align: center;
            position: relative; overflow: hidden; margin-bottom: 20px;
        }
        .target-badge { position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(5px); padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(255,255,255,0.2); }
        .main-ciro-card .stat-label { color: rgba(255,255,255,0.8); text-transform: uppercase; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; margin-bottom: 5px; display: block;}
        .main-ciro-card .stat-value { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.04em; }

        .stats-grid-premium { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card-sm { background: white; border-radius: 16px; padding: 15px; text-align: center; box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.03); }
        .stat-card-sm .stat-label { font-size: 0.65rem; color: var(--text-sub); text-transform: uppercase; font-weight: 600; display: block; margin-bottom: 5px;}
        .stat-card-sm .stat-value { font-size: 1rem; font-weight: 700; color: var(--lg-red); }

        .premium-nav { background: white; border-radius: 50px; padding: 5px; display: flex; box-shadow: var(--shadow-sm); margin-bottom: 20px; border: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; padding: 10px 0; border-radius: 50px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-sub); transition: var(--transition); }
        .nav-item.active { background-color: var(--lg-red); color: white; }

        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
        .card h3 { font-size: 1.1rem; font-weight: 700; margin: 0 0 15px 0; display: flex; align-items: center; gap: 8px; }
        .card h3::before { content: ''; width: 4px; height: 16px; background: var(--lg-red); border-radius: 4px; }

        label { display: block; margin: 12px 0 5px 5px; font-weight: 600; font-size: 0.8rem; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 12px; box-sizing: border-box; font-size: 0.95rem; background: #fafafa; }
        
        button { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: var(--transition); }
        .btn-save { background: var(--lg-red); color: white; }
        .btn-vazgec { background: #f1f3f5; color: #666; margin-top: 8px; }

        .sale-row { background: white; border: 1px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .sale-info { flex: 1; }
        .model-name { font-weight: 700; font-size: 0.95rem; display: block; }
        .brand-meta { font-size: 0.7rem; color: var(--text-sub); margin-top: 3px; display: flex; gap: 8px; }
        .prim-badge { color: #1e7e34; font-weight: 700; }
        .sale-price { font-weight: 800; font-size: 1rem; text-align: right; }
        
        .action-buttons { display: flex; gap: 5px; margin-top: 5px; }
        .action-buttons button { width: auto; padding: 4px 8px; font-size: 0.7rem; margin: 0; }

        .custom-dropdown { position: relative; }
        .dropdown-trigger { padding: 12px; border: 1px solid #e0e0e0; border-radius: 12px; background: #fafafa; cursor: pointer; display: flex; justify-content: space-between; }
        .dropdown-menu { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--lg-red); border-radius: 0 0 12px 12px; z-index: 1000; display: none; max-height: 200px; overflow-y: auto; box-shadow: var(--shadow-md); }
        .dropdown-menu.show { display: block; }
        .dropdown-option { padding: 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .dropdown-option:hover { background: #fff0f3; }

        .hidden { display: none !important; }
        #market-goal-result { background: #fff; padding: 15px; border-left: 4px solid var(--blue); border-radius: 10px; font-size: 0.9rem; margin-top: 15px; }
    </style>
</head>
<body>

<div class="system-selector">
    <button id="sys-tv" class="sys-btn active" onclick="switchSystem('TV')">📺 TV Paneli</button>
    <button id="sys-sb" class="sys-btn" onclick="switchSystem('SB')">🔊 Soundbar Paneli</button>
</div>

<header>
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/8d/LG_logo_%282014%29.svg">
    <div class="divider"></div>
    <div class="app-title" id="main-title">TV <span>Sales Pro</span></div>
</header>

<div class="container">
    <div class="dashboard-container">
        <div class="main-ciro-card">
            <div id="dash-goal-badge" class="target-badge">Hedef: %0</div>
            <span class="stat-label" id="label-top-ciro">Toplam TV Cirosu</span>
            <div id="dash-top-ciro" class="stat-value">0 ₺</div>
        </div>
        
        <div class="stats-grid-premium">
            <div class="stat-card-sm">
                <span class="stat-label">LG Cirosu</span>
                <div id="dash-lg-ciro" class="stat-value">0 ₺</div>
            </div>
            <div class="stat-card-sm">
                <span class="stat-label">Prim</span>
                <div id="dash-prim" class="stat-value">0 ₺</div>
            </div>
            <div class="stat-card-sm">
                <span class="stat-label">Pazar Payı</span>
                <div id="dash-pay" class="stat-value">%0</div>
            </div>
        </div>
    </div>

    <div class="premium-nav">
        <div id="tab-btn-satis" class="nav-item active" onclick="showTab('satis')">Satış Gir</div>
        <div id="tab-btn-ayarlar" class="nav-item" onclick="showTab('ayarlar')">Ürün & Hedef</div>
        <div id="tab-btn-analiz" class="nav-item" onclick="showTab('analiz')">Analiz</div>
    </div>

    <div id="tab-content">
        <div id="satis-section">
            <div class="card">
                <h3 id="satis-form-title">Yeni Satış Kaydı</h3>
                <input type="hidden" id="edit-sale-id">
                
                <label>Marka</label>
                <select id="f-marka" onchange="updateModelSelect()">
                    <option value="LG">LG Electronics</option>
                    <option value="Rakip">Diğer / Rakip</option>
                </select>
                
                <label>Model</label>
                <div class="custom-dropdown" id="lg-dropdown-container">
                    <div class="dropdown-trigger" id="dropdown-display" onclick="toggleDropdown()">Model Seçin... <span>▼</span></div>
                    <div class="dropdown-menu" id="dropdown-menu">
                        <div style="padding:10px; position:sticky; top:0; background:white;">
                            <input type="text" id="m-search" placeholder="Ara..." oninput="filterModels(this.value)">
                        </div>
                        <div id="dropdown-options"></div>
                    </div>
                </div>
                <input type="text" id="f-model-rakip" class="hidden" placeholder="Model adı girin">

                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px;">
                    <div>
                        <label>Birim Fiyat</label>
                        <input type="text" id="f-fiyat" placeholder="0 ₺" oninput="formatInput(this)">
                    </div>
                    <div>
                        <label>Adet</label>
                        <input type="number" id="f-adet" value="1">
                    </div>
                </div>
                
                <label>Not</label>
                <textarea id="f-not" rows="1"></textarea>
                
                <button class="btn-save" onclick="kaydet()">KAYDET</button>
                <button id="btn-satis-vazgec" class="btn-vazgec hidden" onclick="satisFormSifirla()">Vazgeç</button>
            </div>
            <div id="satis-listesi"></div>
        </div>

        <div id="ayarlar-section" class="hidden">
            <div class="card">
                <h3 id="hedef-title">Aylık TV Hedefi</h3>
                <input type="text" id="cfg-hedef" oninput="formatInput(this)">
                <button class="btn-save" onclick="hedefGuncelle()">Hedefi Güncelle</button>
            </div>
            <div class="card">
                <h3 id="urun-form-title">Ürün Tanımla</h3>
                <input type="hidden" id="edit-urun-index">
                <label>Model Adı</label>
                <input type="text" id="m-ad">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>Liste Fiyatı</label><input type="text" id="m-fiyat" oninput="formatInput(this)"></div>
                    <div><label>Birim Prim</label><input type="text" id="m-prim" oninput="formatInput(this)"></div>
                </div>
                <button class="btn-save" id="btn-urun-ekle" onclick="urunEkle()">Ekle</button>
                <button id="btn-urun-vazgec" class="btn-vazgec hidden" onclick="urunFormSifirla()">Vazgeç</button>
            </div>
            <div id="urun-listesi"></div>
        </div>

        <div id="analiz-section" class="hidden">
            <div class="card" style="background:#f0fff4; border: 1px dashed var(--accent);">
                <h3>Tahminleme</h3>
                <div id="proj-data" style="font-size:0.9rem; line-height:1.8;">
                    <p>Günlük Ort: <b id="proj-avg">0 ₺</b></p>
                    <p>Ay Sonu Tahmin: <b id="proj-est">0 ₺</b></p>
                </div>
            </div>
            <div id="market-goal-result">Hesaplanıyor...</div>
            <div class="card" style="margin-top:20px;">
                <canvas id="payChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // Sistem Durumu
    let currentSystem = 'TV'; // 'TV' veya 'SB' (Soundbar)

    // Veri Yapıları
    let data = {
        TV: {
            satislar: JSON.parse(localStorage.getItem('lg_satislar')) || [],
            urunler: JSON.parse(localStorage.getItem('lg_urunler')) || [],
            hedef: localStorage.getItem('lg_hedef') || "1000000"
        },
        SB: {
            satislar: JSON.parse(localStorage.getItem('lg_satislar_sb')) || [],
            urunler: JSON.parse(localStorage.getItem('lg_urunler_sb')) || [],
            hedef: localStorage.getItem('lg_hedef_sb') || "200000"
        }
    };

    let myChart = null;
    let selectedModel = "";

    function toNokta(val) { return val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function toSayi(val) { return val.toString().replace(/\./g, ""); }
    function formatInput(el) { let temiz = el.value.replace(/\D/g, ""); el.value = toNokta(temiz); }

    function switchSystem(sys) {
        currentSystem = sys;
        document.getElementById('sys-tv').classList.toggle('active', sys === 'TV');
        document.getElementById('sys-sb').classList.toggle('active', sys === 'SB');
        
        // Başlıkları güncelle
        document.getElementById('main-title').innerHTML = sys === 'TV' ? 'TV <span>Sales Pro</span>' : 'Soundbar <span>Pro</span>';
        document.getElementById('label-top-ciro').innerText = sys === 'TV' ? 'Toplam TV Cirosu' : 'Toplam Soundbar Cirosu';
        document.getElementById('hedef-title').innerText = sys === 'TV' ? 'Aylık TV Hedefi' : 'Aylık Soundbar Hedefi';
        
        satisFormSifirla();
        urunFormSifirla();
        updateModelSelect();
        render();
    }

    function toggleDropdown() { document.getElementById('dropdown-menu').classList.toggle('show'); }
    
    function updateModelSelect() {
        let marka = document.getElementById('f-marka').value;
        let lgCont = document.getElementById('lg-dropdown-container');
        let rakipInp = document.getElementById('f-model-rakip');
        let optsDiv = document.getElementById('dropdown-options');
        optsDiv.innerHTML = "";

        if(marka === "LG") {
            lgCont.classList.remove('hidden'); rakipInp.classList.add('hidden');
            data[currentSystem].urunler.forEach(u => {
                let d = document.createElement('div');
                d.className = 'dropdown-option'; d.innerText = u.model;
                d.onclick = () => {
                    selectedModel = u.model;
                    document.getElementById('dropdown-display').innerHTML = u.model + " <span>▼</span>";
                    document.getElementById('dropdown-menu').classList.remove('show');
                    document.getElementById('f-fiyat').value = toNokta(u.fiyat);
                };
                optsDiv.appendChild(d);
            });
        } else {
            lgCont.classList.add('hidden'); rakipInp.classList.remove('hidden');
        }
    }

    function kaydet() {
        let marka = document.getElementById('f-marka').value;
        let modelAd = marka === "LG" ? selectedModel : document.getElementById('f-model-rakip').value;
        let birimFiyat = parseInt(toSayi(document.getElementById('f-fiyat').value)) || 0;
        let adet = parseInt(document.getElementById('f-adet').value) || 1;
        let not = document.getElementById('f-not').value;
        let id = document.getElementById('edit-sale-id').value;

        if(!modelAd || birimFiyat <= 0) return alert("Bilgileri kontrol edin!");

        let primBirim = marka === "LG" ? (data[currentSystem].urunler.find(u => u.model === modelAd)?.prim || 0) : 0;
        let toplamFiyat = birimFiyat * adet;
        let toplamPrim = primBirim * adet;

        if(id) {
            let i = data[currentSystem].satislar.findIndex(x => x.id == id);
            data[currentSystem].satislar[i] = { ...data[currentSystem].satislar[i], marka, modelAd, fiyat: toplamFiyat, adet, prim: toplamPrim, not };
        } else {
            data[currentSystem].satislar.push({
                id: Date.now(), marka, modelAd, fiyat: toplamFiyat, adet, prim: toplamPrim, not,
                tarih: new Date().toLocaleDateString('tr-TR')
            });
        }

        saveToLocalStorage();
        satisFormSifirla(); 
        render();
    }

    function render() {
        const currentData = data[currentSystem];
        let lg = currentData.satislar.filter(x => x.marka === "LG").reduce((a,b) => a + b.fiyat, 0);
        let top = currentData.satislar.reduce((a,b) => a + b.fiyat, 0);
        let prim = currentData.satislar.reduce((a,b) => a + b.prim, 0);
        let pay = top > 0 ? (lg / top) * 100 : 0;

        document.getElementById('dash-top-ciro').innerText = toNokta(top) + " ₺";
        document.getElementById('dash-lg-ciro').innerText = toNokta(lg) + " ₺";
        document.getElementById('dash-prim').innerText = toNokta(prim) + " ₺";
        document.getElementById('dash-pay').innerText = "%" + pay.toFixed(1);

        let hedefYuzde = (lg / parseInt(toSayi(currentData.hedef))) * 100;
        document.getElementById('dash-goal-badge').innerText = "Hedef: %" + (isNaN(hedefYuzde) ? 0 : hedefYuzde.toFixed(1));
        document.getElementById('cfg-hedef').value = toNokta(currentData.hedef);

        // Satış Listesi
        document.getElementById('satis-listesi').innerHTML = currentData.satislar.slice().reverse().map(s => `
            <div class="sale-row">
                <div class="sale-info">
                    <span class="model-name">${s.modelAd}</span>
                    <div class="brand-meta">
                        <span>${s.marka}</span> | <span>${s.adet} Adet</span> | 
                        <span class="prim-badge">${toNokta(s.prim)} ₺ Prim</span>
                    </div>
                </div>
                <div class="sale-price-side">
                    <div class="sale-price">${toNokta(s.fiyat)} ₺</div>
                    <div class="action-buttons">
                        <button onclick="satisDuzenle(${s.id})">⚙️</button>
                        <button onclick="sil(${s.id})" style="color:red">🗑️</button>
                    </div>
                </div>
            </div>
        `).join('');

        // Ürün Listesi
        document.getElementById('urun-listesi').innerHTML = currentData.urunler.map((u,i) => `
            <div class="sale-row">
                <div class="sale-info"><b>${u.model}</b><br><small>Prim: ${toNokta(u.prim)} ₺</small></div>
                <div class="sale-price-side">
                    <b>${toNokta(u.fiyat)} ₺</b>
                    <div class="action-buttons">
                        <button onclick="urunDuzenle(${i})">Düzenle</button>
                        <button onclick="urunSil(${i})">Sil</button>
                    </div>
                </div>
            </div>
        `).join('');

        analizGuncelle(lg, top);
    }

    function analizGuncelle(lg, top) {
        let gun = new Date().getDate();
        let aySonu = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
        let avg = lg / gun;
        let est = avg * aySonu;
        
        document.getElementById('proj-avg').innerText = toNokta(Math.round(avg)) + " ₺";
        document.getElementById('proj-est').innerText = toNokta(Math.round(est)) + " ₺";

        let goalBox = document.getElementById('market-goal-result');
        let oran = currentSystem === 'TV' ? 0.30 : 0.50; // TV için %30, SB için %50 pazar payı hedefi
        let hedefYuzdeStr = currentSystem === 'TV' ? '%30' : '%50';

        if(top > 0) {
            let currentPay = lg / top;
            if(currentPay < oran) {
                let fark = (oran * top - lg) / (1 - oran);
                goalBox.innerHTML = `🎯 ${hedefYuzdeStr} Pazar Payı için <b>${toNokta(Math.ceil(fark))} ₺</b> daha LG satmalısın.`;
            } else {
                goalBox.innerHTML = `✅ Pazar payın ${hedefYuzdeStr} hedefinin üzerinde! (%${(currentPay*100).toFixed(1)})`;
            }
        }

        const ctx = document.getElementById('payChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['LG', 'Rakip'], datasets: [{ data: [lg, top - lg], backgroundColor: ['#a50034', '#ddd'] }] },
            options: { plugins: { legend: { position: 'bottom' } } }
        });
    }

    // Helper Functions
    function saveToLocalStorage() {
        if(currentSystem === 'TV') {
            localStorage.setItem('lg_satislar', JSON.stringify(data.TV.satislar));
            localStorage.setItem('lg_urunler', JSON.stringify(data.TV.urunler));
            localStorage.setItem('lg_hedef', data.TV.hedef);
        } else {
            localStorage.setItem('lg_satislar_sb', JSON.stringify(data.SB.satislar));
            localStorage.setItem('lg_urunler_sb', JSON.stringify(data.SB.urunler));
            localStorage.setItem('lg_hedef_sb', data.SB.hedef);
        }
    }

    function satisDuzenle(id) {
        let s = data[currentSystem].satislar.find(x => x.id == id);
        document.getElementById('edit-sale-id').value = s.id;
        document.getElementById('f-marka').value = s.marka;
        updateModelSelect();
        if(s.marka === "LG") {
            selectedModel = s.modelAd;
            document.getElementById('dropdown-display').innerHTML = s.modelAd + " <span>▼</span>";
        } else {
            document.getElementById('f-model-rakip').value = s.modelAd;
        }
        document.getElementById('f-fiyat').value = toNokta(s.fiyat / s.adet);
        document.getElementById('f-adet').value = s.adet;
        document.getElementById('f-not').value = s.not || "";
        document.getElementById('btn-satis-vazgec').classList.remove('hidden');
        showTab('satis');
        window.scrollTo(0,0);
    }

    function sil(id) { if(confirm("Silinsin mi?")) { data[currentSystem].satislar = data[currentSystem].satislar.filter(x => x.id != id); saveToLocalStorage(); render(); } }

    function urunEkle() {
        let model = document.getElementById('m-ad').value;
        let fiyat = parseInt(toSayi(document.getElementById('m-fiyat').value)) || 0;
        let prim = parseInt(toSayi(document.getElementById('m-prim').value)) || 0;
        let index = document.getElementById('edit-urun-index').value;
        
        if(!model || fiyat <= 0) return alert("Eksik bilgi!");
        
        if(index !== "") data[currentSystem].urunler[index] = {model, fiyat, prim};
        else data[currentSystem].urunler.push({model, fiyat, prim});
        
        saveToLocalStorage(); urunFormSifirla(); updateModelSelect(); render();
    }

    function urunDuzenle(i) {
        let u = data[currentSystem].urunler[i];
        document.getElementById('edit-urun-index').value = i;
        document.getElementById('m-ad').value = u.model;
        document.getElementById('m-fiyat').value = toNokta(u.fiyat);
        document.getElementById('m-prim').value = toNokta(u.prim);
        document.getElementById('btn-urun-vazgec').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function urunSil(i) { if(confirm("Ürün silinsin mi?")) { data[currentSystem].urunler.splice(i,1); saveToLocalStorage(); updateModelSelect(); render(); } }
    function hedefGuncelle() { data[currentSystem].hedef = toSayi(document.getElementById('cfg-hedef').value); saveToLocalStorage(); render(); alert("Hedef Güncellendi"); }

    function showTab(t) {
        ['satis', 'ayarlar', 'analiz'].forEach(x => {
            document.getElementById(x + '-section').classList.add('hidden');
            document.getElementById('tab-btn-' + x).classList.remove('active');
        });
        document.getElementById(t + '-section').classList.remove('hidden');
        document.getElementById('tab-btn-' + t).classList.add('active');
    }

    function satisFormSifirla() {
        document.getElementById('edit-sale-id').value = "";
        document.getElementById('f-fiyat').value = "";
        document.getElementById('f-adet').value = "1";
        document.getElementById('f-not').value = "";
        selectedModel = "";
        document.getElementById('dropdown-display').innerHTML = "Model Seçin... <span>▼</span>";
        document.getElementById('btn-satis-vazgec').classList.add('hidden');
    }

    function urunFormSifirla() {
        document.getElementById('edit-urun-index').value = "";
        document.getElementById('m-ad').value = "";
        document.getElementById('m-fiyat').value = "";
        document.getElementById('m-prim').value = "";
        document.getElementById('btn-urun-vazgec').classList.add('hidden');
    }

    function filterModels(val) {
        let opts = document.getElementsByClassName("dropdown-option");
        for (let opt of opts) opt.style.display = opt.innerText.toLowerCase().includes(val.toLowerCase()) ? "" : "none";
    }

    // İlk Çalıştırma
    switchSystem('TV');
</script>
